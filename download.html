<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Khu phố Ẩm thực Vĩnh Khánh</title>
    <style>
        body { font-family: sans-serif; text-align: center; padding: 50px 20px; background: #E1F5EE; color: #0F6E56;}
        .loader { border: 4px solid #f3f3f3; border-top: 4px solid #1D9E75; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; margin: 20px auto; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        /* Thêm style cho nút bấm cứu hộ */
        .btn-download { display: inline-block; margin-top: 20px; padding: 12px 24px; background: #1D9E75; color: white; text-decoration: none; border-radius: 8px; font-weight: bold; font-size: 16px;}
        .btn-download:active { background: #157959; }
    </style>
</head>
<body>
    <h2>Chào mừng đến với Khu phố Ẩm thực Vĩnh Khánh!</h2>
    <p>Đang kết nối bạn với hệ thống Hướng dẫn viên ảo...</p>
    
    <div class="loader" id="loading-spinner"></div>
    
    <!-- Giao diện dự phòng hiện ra sau 2.5 giây -->
    <div id="fallback-ui" style="display: none; margin-top: 30px;">
        <p style="color: #E53935; font-weight: bold;">Hệ thống không thể tự động mở Ứng dụng.</p>
        <p>Vui lòng cài đặt ứng dụng bằng cách nhấn vào nút bên dưới:</p>
        <a href="https://www.dropbox.com/scl/fi/4tnijggm2v7ox96eowcth/com.companyname.multilingualaudiotravelapp.apk?rlkey=u9yrfp1xzuohg2f6rgp68425o&st=03y7qutk&dl=1" class="btn-download">TẢI APP VỀ MÁY</a>
    </div>

    <script>
        var appLink = "vktour://home"; 
        var downloadLink = "https://www.dropbox.com/scl/fi/6bu6ht4nfsvypchlv8fl2/com.companyname.multilingualaudiotravelapp.apk?rlkey=cfld691dyf42epa7qdu6xw7x4&st=1jlw5lhh&dl=1";

        // 1. Dùng Iframe tàng hình để đánh thức App (Tránh làm sập web)
        var iframe = document.createElement("iframe");
        iframe.style.border = "none";
        iframe.style.width = "1px";
        iframe.style.height = "1px";
        iframe.src = appLink;
        document.body.appendChild(iframe);

        // 2. Hẹn giờ 2.5 giây: Nếu người dùng vẫn ở trang web (không mở được app)
        var fallbackTimer = setTimeout(function() {
            // Ẩn vòng xoay
            document.getElementById('loading-spinner').style.display = 'none';
            // Hiện nút bấm thủ công
            document.getElementById('fallback-ui').style.display = 'block';
            // Cố gắng tự động gọi link tải
            window.location.href = downloadLink;
        }, 2500);

        // 3. Nếu App mở thành công, trang web bị mờ đi -> Hủy hẹn giờ ngay
        window.onblur = function() {
            clearTimeout(fallbackTimer);
        };
    </script>
</body>
</html>
