<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tải ứng dụng Tour App</title>
    <style>
        body {
            font-family: sans-serif;
            text-align: center;
            padding: 50px 20px;
            background: #E1F5EE;
            color: #0F6E56;
        }

        .loader {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #1D9E75;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }

        @keyframes spin {
            0% {
                transform: rotate(0deg);
            }

            100% {
                transform: rotate(360deg);
            }
        }
        /* Thêm class để ẩn phần tử khi cần */
        .hidden {
            display: none !important;
        }
    </style>
</head>
<body>
    <h2 id="statusText">Đang kiểm tra phần cứng thiết bị...</h2>
    <div id="spinner" class="loader"></div>
    <p id="subText">Vui lòng đợi trong giây lát.</p>

    <script>
        // 1. Giữ nguyên link của bạn
        var appLink = "vktour://home";
        var downloadLink = "https://www.dropbox.com/scl/fi/8x8q1vqxyvhs721x6hjqh/com.companyname.multilingualaudiotravelapp.apk?rlkey=o4bhaniazmt8o4mofn9kgwcvd&st=8aws75pq&dl=1";

        // 2. Kịch bản của Giảng viên: Hẹn giờ 1.5 giây để giả vờ quét phần cứng
        setTimeout(function () {

            // Hàm Random ra số 0 hoặc 1
            let cauHinh = Math.floor(Math.random() * 2);

            // Lấy các thẻ HTML để đổi chữ
            let statusText = document.getElementById("statusText");
            let spinner = document.getElementById("spinner");
            let subText = document.getElementById("subText");

            if (cauHinh === 1) {
                // ==========================================
                // TRƯỜNG HỢP 1 (MÁY MẠNH): CHO PHÉP TẢI APP
                // ==========================================
                statusText.innerHTML = "✅ Thiết bị tương thích tốt!";
                statusText.style.color = "green";
                spinner.classList.add("hidden"); // Tắt vòng xoay
                subText.innerHTML = "Hệ thống đang mở App hoặc tự động tải file cài đặt...";

                // Gọi lại đúng logic cũ của bạn: Kích hoạt Deep Link và Dropbox
                var fallbackTimer = setTimeout(function () {
                    window.location.href = downloadLink;
                }, 2500);

                window.location.href = appLink;

                window.onblur = function () {
                    clearTimeout(fallbackTimer);
                };

            } else {
                // ==========================================
                // TRƯỜNG HỢP 0 (MÁY YẾU): CHẶN KHÔNG CHO TẢI
                // ==========================================
                statusText.innerHTML = "❌ Rất tiếc! Cấu hình máy bạn quá yếu.";
                statusText.style.color = "red";
                spinner.classList.add("hidden"); // Tắt vòng xoay
                subText.innerHTML = "Ứng dụng yêu cầu cấu hình cao để xử lý Audio và Bản đồ. Quá trình tải đã bị hủy.";
                subText.style.color = "red";

                // Không gọi hàm window.location.href nữa -> Đứng im tại trang này.
            }

        }, 1500); // 1500ms = 1.5 giây
    </script>
</body>
</html>
